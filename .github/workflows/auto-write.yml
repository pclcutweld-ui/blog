name: Daily GEO SEO Pure HTML Blogger (Python Engine)

on:
  schedule:
    - cron: '0 1 * * *' 
  workflow_dispatch: 

jobs:
  auto-html-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Python Generator Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_blog.py

      - name: Push Static File and Enforce Direct Route
        run: |
          git config --global user.name "PCL HTML Automatic Publisher"
          git config --global user.email "seo@pclgroupcncmachine.com"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "site(geo): deploy pure static html via python engine"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No changes to commit."
          fi

name: Auto Write Blog

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 0 * * *' # 每天自动定时触发
  workflow_dispatch: # 按钮手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requests Library
        run: pip install requests

      # 🚀 直接无压力跑脚本，不需要配置复杂的环境变量挂载了
      - name: Run generation script
        run: python generate_blog.py

      # 💾 将生成的 index.html 自动推送更新
      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Pure standalone auto-blog deployment" && git push origin master)

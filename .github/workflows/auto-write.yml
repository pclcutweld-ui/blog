name: Daily Google AI Blog Publisher

on:
  schedule:
    - cron: '0 1 * * *' # 每天国际标准时间 01:00 (北京时间 09:00) 自动点火
  workflow_dispatch: # 允许你在 GitHub 页面随时手动点击 "Run workflow" 运行

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取最新代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 requests 依赖库
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 运行 AI 撰写与博客板块自动编译引擎
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_blog.py

      - name: 物理提交并推送至 Cloudflare 部署分支
        run: |
          git config --global user.name "PCL Blog Robot"
          git config --global user.email "seo@pclgroupcncmachine.com"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "site(blog): fully generate new article and compile index gateway"
            git push origin HEAD:${{ github.ref }}
          else
            echo "没有产生任何新内容，无需提交。"
          fi

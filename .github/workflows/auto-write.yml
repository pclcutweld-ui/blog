name: Daily GEO SEO Pure HTML Blogger (Ultimate Fully Featured)

on:
  schedule:
    - cron: '0 1 * * *' # 每天早上 9:00 全自动发射
  workflow_dispatch: 

jobs:
  auto-html-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize Database Pool
        run: |
          # 如果仓库里没有这些基础文件则创建默认保底，如果有了会直接使用你写的所有链接和图片
          if [ ! -f "keywords.txt" ]; then echo "12kW H-Beam 3D laser cutting machine price" > keywords.txt; fi
          if [ ! -f "backlinks.txt" ]; then
            cat << 'EOF' > backlinks.txt
          https://pclgroupcncmachine.com/structural-steel-laser-cutting/
          https://pclgroupcncmachine.com/
          EOF
          fi
          if [ ! -f "images.txt" ]; then
            echo "https://pclgroupcncmachine.com/wp-content/uploads/2024/12/tcp-h-beam-cutting-machine-scaled.jpg" > images.txt
          fi

      - name: Pick and Rotate Data Pool
        id: picker
        run: |
          # 1. 轮流提取当天核心霸屏词
          KEYWORD=$(head -n 1 keywords.txt | xargs)
          echo "keyword=$KEYWORD" >> $GITHUB_OUTPUT
          tail -n +2 keywords.txt > t1.txt && echo "$KEYWORD" >> t1.txt && mv t1.txt keywords.txt
          
          # 2. 从你的链接库里提取当天做锚文本的外链（绝不减少，按顺序轮流提取）
          LINK=$(head -n 1 backlinks.txt | xargs)
          echo "link=$LINK" >> $GITHUB_OUTPUT
          tail -n +2 backlinks.txt > t2.txt && echo "$LINK" >> t2.txt && mv t2.txt backlinks.txt
          
          # 3. 从你的图片库里随机盲抽一张真机大图，全自动加上 SEO Alt 标签
          IMG=$(shuf -n 1 images.txt | xargs)
          echo "img=$IMG" >> $GITHUB_OUTPUT

      - name: Generate High-SEO Prompt (Anti-AI Flavor)
        if: steps.picker.outputs.keyword != ''
        run: |
          # 核心大招：生成强力去AI味提示词，强制打散埋入你的链接和图片
          cat << 'EOF' > prompt_template.txt
          You are an elite B2B machinery sales director and hands-on welding engineer. Write a highly professional, technically precise industrial whitepaper for the keyword "${{ steps.picker.outputs.keyword }}".
          
          [CRITICAL - REMOVE ALL AI FLAVOR]:
          - Do NOT use typical AI transition words like "In conclusion", "Crucial role", "Furthermore", "In summary", "Moreover", "Dive deep", "Testament".
          - Use a confident, direct, and slightly blunt tone, common among industrial manufacturing experts.
          - Speak strictly in terms of business ROI, steel fabricator pain points, mechanical tolerances, and factory output metrics.
          
          [REQUIRED STRUCTURE]:
          1. Technical Evaluation (Use realistic numbers, structural tolerances, H-beam dimensions like 300x300mm or HEA/HEB standards).
          2. Machine Specification & Advantages (Break down real industrial components: cutting heads, heavy-duty chucks, rack and pinion systems).
          3. Exact Internal Hyperlink Implementation (Link Library): You MUST seamlessly embed the exact string below as an organic anchor text hyperlink in the middle of a paragraph. Do not create an isolated link. 
             Anchor text MUST be a natural phrasing related to structural steel processing or automation.
             Link target: "${{ steps.picker.outputs.link }}"
          4. Image Placement: Embed this exact image HTML element inside the body text organically to show the real machine layout:
             <img src="${{ steps.picker.outputs.img }}" alt="${{ steps.picker.outputs.keyword }}" style="width:100%;max-width:800px;border-radius:8px;margin:20px 0;box-shadow:0 4px 6px rgba(0,0,0,0.1);">
          5. Real-world FAQ Section: Provide 3 hard-core, realistic technical Q&As that global steel buyers ask during commercial procurement.
          6. Call to Action: Add contact methods at the bottom: WhatsApp: 8618660174681, email: pclmachinery@outlook.com.
          
          [OUTPUT FORMAT]:
          Return the entire response as a single, valid, self-contained HTML file (including <html>, <head> with a catchy <title>, <style> for a premium clean layout, and <body>). 
          At the very bottom of the HTML document, just before the closing </body> tag, you MUST inject a perfectly structured <script type="application/ld+json"> containing a dual JSON-LD Schema that wraps BOTH Article and FAQPage into a single graph.
          Output ONLY the raw HTML code. Do NOT enclose the response in markdown blocks like ```html ... ```.
          EOF

      - name: Package Payload Safely via JQ
        if: steps.picker.outputs.keyword != ''
        run: |
          # 绝不报错的核心：使用 JQ 将复杂的 HTML 逻辑直接打包成环境安全变量，阻断转义字符报错
          PROMPT_CONTENT=$(cat prompt_template.txt)
          jq -n --arg text "$PROMPT_CONTENT" '{"contents": [{"parts": [{"text": $text}]}]}' > request.json

      - name: Call Gemini API
        if: steps.picker.outputs.keyword != ''
        id: gemini
        run: |
          RESPONSE=$(curl -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @request.json)
          
          ARTICLE_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')
          
          # 双层过滤机制：确保清洗掉任何顽固的 markdown 符号，只留下完美的纯 HTML 代码
          echo "$ARTICLE_TEXT" | sed 's/^```html//g' | sed 's/^```//g' | sed 's/```$//g' > temp_page.html
          
          CLEAN_TITLE=$(echo "${{ steps.picker.outputs.keyword }}" | tr ' ' '-')
          echo "clean_title=$CLEAN_TITLE" >> $GITHUB_OUTPUT

      - name: Push to Cloudflare Directory
        if: steps.picker.outputs.keyword != ''
        run: |
          git config --global user.name "PCL HTML Automatic Publisher"
          git config --global user.email "seo@pclgroupcncmachine.com"
          
          mkdir -p blog
          FILE_NAME="blog/${{ steps.gemini.outputs.clean_title }}.html"
          mv temp_page.html $FILE_NAME
          
          # 擦除运行产生的临时过渡文件
          rm -f request.json prompt_template.txt
          
          git add .
          git commit -m "site(geo): deployed advanced non-ai flavor features for ${{ steps.picker.outputs.keyword }}"
          git push

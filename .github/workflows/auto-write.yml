- name: Call Gemini API (Pure Code Edition)
        if: steps.picker.outputs.keyword != ''
        id: gemini
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}" \
            -H "Content-Type: application/json" \
            -d @request.json)
          
          ARTICLE_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')
          
          if [ "$ARTICLE_TEXT" = "null" ] || [ -z "$ARTICLE_TEXT" ]; then
            echo "Error: Gemini API response is empty!"
            echo "$RESPONSE"
            exit 1
          fi
          
          echo "$ARTICLE_TEXT" | sed 's/^```html//g' | sed 's/^```//g' | sed 's/```$//g' > temp_page.html
          
          CLEAN_TITLE=$(echo "${{ steps.picker.outputs.keyword }}" | tr ' ' '-')
          echo "clean_title=$CLEAN_TITLE" >> $GITHUB_OUTPUT
